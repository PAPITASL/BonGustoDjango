{% extends "base.html" %}

{% block title %}{{ accion }} Menu{% endblock %}

{% block content %}
<h4 class="text-center mb-4">
  <strong>{{ accion }} Menu</strong>
</h4>

<div class="menu-form-wrapper">
  <form
    action="{% if menu.id_menu %}/menus/{{ menu.id_menu }}/update{% else %}/menus/store{% endif %}"
    method="post"
    class="modern-form"
    {% if not readonly %}
    data-confirm-title="{% if menu.id_menu %}Confirmar actualizacion{% else %}Confirmar creacion{% endif %}"
    data-confirm-text="{% if menu.id_menu %}Seguro que deseas guardar los cambios de este menu?{% else %}Seguro que deseas crear este item del menu?{% endif %}"
    data-confirm-button="{% if menu.id_menu %}Si, actualizar{% else %}Si, crear{% endif %}"
    {% endif %}
  >
    {% csrf_token %}

    <div class="mb-3">
      <label class="form-label">Item *</label>
      <input
        type="text"
        name="nombre_menu"
        maxlength="300"
        class="form-control"
        placeholder="Ej: Pizza Margarita"
        value="{{ menu.nombre_menu|default:'' }}"
        {% if readonly %}disabled{% else %}required{% endif %}
      >
    </div>

    <div class="mb-3">
      <label class="form-label">Descripcion</label>
      <textarea
        name="descripcion_menu"
        rows="4"
        maxlength="300"
        class="form-control"
        placeholder="Descripcion del menu (opcional)"
        {% if readonly %}disabled{% endif %}
      >{{ menu.descripcion_menu|default:'' }}</textarea>
    </div>

    <div class="d-flex gap-2">
      {% if not readonly %}
      <button type="submit" class="btn btn-success">
        <i class="fa fa-save"></i> Guardar
      </button>
      {% endif %}

      <a href="/menus" class="btn btn-secondary">
        <i class="fa fa-times"></i>
        {% if readonly %}Volver{% else %}Cancelar{% endif %}
      </a>

      {% if readonly %}
      <a href="/menus/{{ menu.id_menu }}/edit" class="btn btn-primary">Editar</a>
      {% endif %}
    </div>
  </form>
</div>
{% endblock %}
