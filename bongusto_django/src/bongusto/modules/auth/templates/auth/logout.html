<!-- Este template se usa cuando el usuario cierra sesión -->
<!-- Muestra un mensaje y redirige automáticamente al login -->

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <!-- Esto redirige automáticamente después de 2 segundos -->
  <!-- content="2;url=/login" significa: espera 2 segundos y luego ve a /login -->
  <meta http-equiv="refresh" content="2;url=/login">

  <!-- Responsive para celular -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Título de la pestaña -->
  <title>BonGusto | Cerrando sesión</title>

  <!-- Carga de fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Fuente principal -->
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    /* Reset básico */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Body centrado totalmente en pantalla */
    body {
      min-height: 100vh;

      /* display grid + place-items center centra TODO */
      display: grid;
      place-items: center;

      padding: 24px;
      background: #f2f1f4;

      font-family: "Manrope", system-ui, sans-serif;
      color: #181818;
    }

    /* Contenedor principal (como una card) */
    .logout-shell {
      width: min(100%, 460px); /* Esto hace que sea responsive automáticamente */
      padding: 42px 36px;
      border-radius: 34px;

      /* Fondo tipo glass (como el login que hiciste antes) */
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.96);
      box-shadow: 0 24px 40px rgba(24, 24, 24, 0.08);

      text-align: center;
    }

    /* Logo */
    .logout-logo {
      width: 120px;
      height: 120px;
      display: block;
      margin: 0 auto 20px;

      object-fit: contain;
      object-position: center;

      border-radius: 28px;
    }

    /* Título */
    .logout-title {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 10px;
    }

    /* Texto debajo del título */
    .logout-copy {
      color: #73727a;
      font-size: 0.98rem;
      line-height: 1.6;
      margin-bottom: 18px;
    }

    /* Loader (círculo que gira) */
    .logout-loader {
      width: 42px;
      height: 42px;
      margin: 0 auto;

      border-radius: 50%;

      /* Borde gris claro */
      border: 4px solid rgba(217, 4, 22, 0.14);

      /* Parte roja que da el efecto de giro */
      border-top-color: #d90416;

      /* Animación */
      animation: spin 0.85s linear infinite;
    }

    /* Animación del loader */
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

  </style>
</head>

<body>

  <!-- Contenedor principal -->
  <div class="logout-shell">

    <!-- Logo -->
    <img 
      src="/static/img/logobongusto.png?v=20260322a" 
      alt="BonGusto" 
      class="logout-logo" 
      width="120" 
      height="120"
    >

    <!-- Título -->
    <h1 class="logout-title">Cerrando sesión</h1>

    <!-- Texto informativo -->
    <p class="logout-copy">
      Serás redirigido al inicio de sesión en un momento.
    </p>

    <!-- Loader visual -->
    <div class="logout-loader" aria-hidden="true"></div>

  </div>

</body>
</html>
