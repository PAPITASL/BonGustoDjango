<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Configuración básica -->
  <meta charset="UTF-8">
  <title>BonGusto | Nueva contrasena</title>
  <!-- Responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Optimización de fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Fuente principal -->
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Estilos del login -->
  <link rel="stylesheet" href="/static/css/auth-login.css?v=20260322b">
  <!-- Íconos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
  <!-- Layout principal -->
  <div class="auth-row">
    <!-- Lado izquierdo con imagen -->
    <div class="auth-image-section">
      <div class="auth-image-overlay">
        <!-- Logo -->
        <img src="/static/img/logobongusto.png?v=20260322a" alt="BonGusto" class="auth-image-logo" width="124" height="124">
      </div>
    </div>
    <!-- Lado derecho con el formulario -->
    <div class="auth-form-section">
      <!-- Formulario para cambiar contraseña -->
      <form action="/password/reset" method="post" class="auth-card">
        <!-- Seguridad Django -->
        {% csrf_token %}
        <!-- Se envía el correo oculto -->
        <input type="hidden" name="email" value="{{ email }}">
        <!-- Título -->
        <h2 class="auth-title">Nueva contrasena</h2>
        <!-- Texto de ayuda -->
        <p class="auth-subcopy">
          Escribe el codigo que llego a tu correo y luego define la nueva clave.
        </p>
        <!-- Si hay error -->
        {% if error %}
        <div style="margin-bottom:16px;padding:12px 14px;border-radius:14px;background:#fff0f1;color:#b42318;font-size:14px;font-weight:600;">
          {{ error }}
        </div>
        {% endif %}
        <!-- Código de verificación -->
        <div class="form-group">
          <label for="reset-code">Codigo de verificacion</label>
          <!-- Aquí el usuario escribe el código que llegó al correo -->
          <input id="reset-code" type="text" name="code" maxlength="6" placeholder="Ingresa el codigo de 6 digitos" required>
          <!-- Ayuda visual -->
          <small class="field-help">Revisa el correo {{ email }}.</small>
        </div>
        <!-- Nueva contraseña -->
        <div class="form-group">
          <label for="new-password">Nueva contrasena</label>
          <div class="password-field">
            <!-- Input con validación fuerte -->
            <!-- Regex para seguridad -->
            <!-- Texto de ayuda (tooltip) -->

            <input
              id="new-password"
              type="password"
              name="password"
              maxlength="255"
              required
              pattern="^(?=.*[A-Z])(?=.*[a-z])(?=.*\d)(?=.*[@$!%*?&.\-_#]).{8,}$"
              title="{{ password_policy_help }}"
            >
            <!-- Botón para mostrar/ocultar -->
            <button type="button" class="password-toggle" data-password-target="new-password" aria-label="Mostrar u ocultar contrasena">
              <i class="fa-regular fa-eye"></i>
            </button>
          </div>
          <!-- Explicación de reglas de contraseña -->
          <small class="field-help">{{ password_policy_help }}</small>
        </div>
        <!-- Confirmación de contraseña -->
        <div class="form-group">
          <label for="confirm-password">Confirmar contrasena</label>
          <div class="password-field">
            <!-- Segundo input para confirmar -->
            <input id="confirm-password" type="password" name="password_confirm" maxlength="255" required>
            <!-- Botón mostrar/ocultar -->
            <button type="button" class="password-toggle" data-password-target="confirm-password" aria-label="Mostrar u ocultar contrasena">
              <i class="fa-regular fa-eye"></i>
            </button>
          </div>
        </div>
        <!-- Botón final -->
        <button type="submit" class="btn-primary">Cambiar contrasena</button>
      </form>
    </div>
  </div>
  <script>
    // Script para mostrar u ocultar contraseñas
    document.querySelectorAll('[data-password-target]').forEach(function(toggle) {
      toggle.addEventListener('click', function() {
        const input = document.getElementById(toggle.dataset.passwordTarget);
        const icon = toggle.querySelector('i');
        const isPassword = input.type === 'password';
        // Cambia el tipo del input
        input.type = isPassword ? 'text' : 'password';
        // Cambia el ícono
        icon.className = isPassword ? 'fa-regular fa-eye-slash' : 'fa-regular fa-eye';
      });
    });
  </script>
</body>
</html>
